<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solera</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #eaf6f6;
    color: #333;
}

/* 🌊 PORTADA */
header {
    position: relative;
    height: 300px;
    overflow: hidden;
}

header img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(60%);
}

header .texto {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: white;
}

header h1 {
    margin: 0;
    font-size: 50px;
}

header h2 {
    margin: 5px 0 0 0;
    font-size: 18px;
}

/* 🔗 MENÚ */
nav {
    background-color: #055160;
    padding: 12px;
    text-align: center;
}

nav a {
    color: #eaf6f6;
    margin: 0 15px;
    text-decoration: none;
    font-weight: bold;
}

nav a:hover {
    text-decoration: underline;
}

/* 📦 SECCIONES */
section {
    padding: 25px;
}

h2 {
    color: #055160;
}

/* 🧱 PRODUCTOS */
.categoria {
    background-color: white;
    margin: 15px 0;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* ✨ SCROLL SUAVE */
html {
    scroll-behavior: smooth;
}

footer {
    background-color: #055160;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<!-- 🌊 PORTADA -->
<header id="inicio">
    <img src="playa.jpg" alt="Solera">

    <div class="texto">
        <h1>Solera</h1>
        <h2>Tienda de complementos en Chipiona</h2>
    </div>
</header>

<!-- 🔗 MENÚ -->

    <a href="#contacto">Contacto</a>
</nav>

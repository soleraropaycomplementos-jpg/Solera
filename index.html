<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solera</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #eaf6f6;
    color: #333;
    padding-top: 60px;
}

/* NAV */
nav {
    background: #055160;
    text-align: center;
    padding: 14px;
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 1000;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: 600;
}

/* HEADER */
header {
    position: relative;
    height: 340px;
}

header img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(55%);
}

header .texto {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    color: white;
    text-align: center;
}

header h1 { font-size: 58px; }

/* SECCIONES */
section { padding: 40px 25px; }

h2 { text-align: center; }

/* CATEGORÍAS */
.categorias-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.categoria-card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    text-decoration: none;
    color: black;
    box-shadow: 0 4px 14px rgba(0,0,0,0.1);
}

.categoria-card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
}

.categoria-card h3 {
    text-align: center;
    padding: 10px;
}

/* PRODUCTOS */
.caja {
    background: white;
    padding: 15px;
    margin: 10px auto;
    border-radius: 12px;
    max-width: 500px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    text-align: center;
}

/* NUEVO */
.nuevo::after {
    content: "NUEVO";
    background: red;
    color: white;
    font-size: 11px;
    padding: 3px 6px;
    margin-left: 6px;
    border-radius: 5px;
}

/* NOVEDADES */
.novedades-wrapper {
    display: flex;
    align-items: center;
}

.novedades-slider {
    display: flex;
    gap: 15px;
    overflow-x: auto;
    padding: 10px;
    width: 100%;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
}

.novedades-slider::-webkit-scrollbar {
    display: none;
}

.novedades-slider .categoria-card {
    min-width: 200px;
    flex: 0 0 auto;
    scroll-snap-align: start;
}

/* FLECHAS PC */
.flecha {
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    font-size: 28px;
    padding: 10px;
    cursor: pointer;
    border-radius: 50%;
}

/* ❌ SOLO MÓVIL SIN FLECHAS */
@media (max-width: 768px) {
    .flecha { display: none !important; }
}

/* MODAL */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
}

.modal:target { display: flex; }

.modal-contenido {
    background: white;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
}

/* REDES */
.social-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 15px;
}

.social-card {
    background: white;
    border-radius: 14px;
    text-align: center;
    padding: 15px;
    text-decoration: none;
    color: black;
}

/* FOOTER */
footer {
    background: #055160;
    color: white;
    text-align: center;
    padding: 20px;
}

/* 🚨 POPUP NO HAY MÁS RESULTADOS (NUEVO CENTRADO) */
.aviso-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.aviso-box {
    background: white;
    padding: 25px 40px;
    border-radius: 15px;
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<header>
    <img src="playa.jpg">
    <div class="texto">
        <h1>Solera</h1>
        <p>Moda verano</p>
    </div>
</header>

<nav>
    <a href="#inicio">Inicio</a>
    <a href="#novedades">Novedades</a>
    <a href="#categorias">Categorías</a>
    <a href="#contacto">Contacto</a>
</nav>

<section id="novedades">

<h2>Novedades</h2>

<div class="novedades-wrapper">

<button class="flecha" onclick="move(-1)">&#10094;</button>

<div class="novedades-slider"></div>

<button class="flecha" onclick="move(1)">&#10095;</button>

</div>

</section>

<script>
const slider = document.querySelector(".novedades-slider");

document.querySelectorAll(".nuevo").forEach(e => {
    const img = e.querySelector("img").src;
    const name = e.querySelector("p").innerText;
    const link = e.querySelector("a").href;

    const card = document.createElement("a");
    card.href = link;
    card.className = "categoria-card";
    card.innerHTML = `<img src="${img}"><h3>${name}</h3>`;
    slider.appendChild(card);
});

function move(dir){
    const max = slider.scrollWidth - slider.clientWidth;
    const next = slider.scrollLeft + dir * 220;

    if(next < 0 || next > max){
        const overlay = document.createElement("div");
        overlay.className = "aviso-overlay";

        overlay.innerHTML = `
            <div class="aviso-box">
                No hay más resultados
            </div>
        `;

        document.body.appendChild(overlay);

        setTimeout(() => overlay.remove(), 2000);
        return;
    }

    slider.scrollBy({left: dir * 220, behavior: "smooth"});
}
</script>

</body>
</html>

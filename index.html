<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solera</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #eaf6f6;
    color: #333;
    padding-top: 60px;
}

/* NAV */
nav {
    background: #055160;
    text-align: center;
    padding: 14px;
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 1000;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: 600;
}

/* HEADER */
header {
    position: relative;
    height: 340px;
}

header img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(55%);
}

header .texto {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    color: white;
    text-align: center;
}

/* SECCIONES */
section {
    padding: 40px 25px;
}

h2 {
    text-align: center;
}

/* ================= CATEGORÍAS ================= */

.categorias-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.categoria-card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    text-decoration: none;
    color: black;
    box-shadow: 0 4px 14px rgba(0,0,0,0.1);
}

.categoria-card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
}

/* ================= PRODUCTOS ================= */

.caja {
    background: white;
    padding: 15px;
    margin: 10px auto;
    border-radius: 12px;
    max-width: 500px;
    text-align: center;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
}

/* MODAL PRODUCTO */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.modal:target {
    display: flex;
}

.modal-contenido {
    background: white;
    padding: 20px;
    border-radius: 12px;
}

/* ================= NOVEDADES ================= */

.novedades-wrapper {
    display: flex;
    align-items: center;
}

.novedades-slider {
    display: flex;
    gap: 15px;
    overflow-x: auto;
    width: 100%;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
}

.novedades-slider::-webkit-scrollbar {
    display: none;
}

.novedades-slider .categoria-card {
    min-width: 200px;
    scroll-snap-align: start;
}

/* flechas PC */
.flecha {
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    font-size: 28px;
    padding: 10px;
    border-radius: 50%;
    cursor: pointer;
}

/* móvil sin flechas */
@media (max-width:768px){
    .flecha{ display:none; }
}

/* aviso */
.aviso-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:99999;
}

.aviso-box {
    background:white;
    padding:30px 50px;
    border-radius:12px;
    font-size:20px;
    font-weight:bold;
}

/* ================= CONTACTO ================= */

.social-grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
    gap:15px;
}

.social-card {
    background:white;
    padding:15px;
    border-radius:12px;
    text-align:center;
    text-decoration:none;
    color:black;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* ================= RESEÑAS ================= */

#reseñas {
    background:white;
    padding:40px 20px;
}

.reseñas-box {
    max-width:600px;
    margin:auto;
    height:300px;
    overflow-y:auto;
    border:1px solid #ddd;
    border-radius:12px;
    padding:10px;
}

.reseña {
    background:#f7f7f7;
    margin:10px 0;
    padding:10px;
    border-radius:10px;
}

.btn-reseña {
    display:block;
    margin:20px auto;
    padding:12px 20px;
    background:#055160;
    color:white;
    border:none;
    border-radius:8px;
}

/* modal reseñas */
.modal-reseña {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-reseña.activo {
    display:flex;
}

.modal-box {
    background:white;
    padding:20px;
    border-radius:12px;
    width:90%;
    max-width:400px;
}

/* estrellas */
.estrellas {
    display:flex;
    flex-direction:row-reverse;
    justify-content:center;
    font-size:28px;
}

.estrellas input{display:none;}

.estrellas label{color:lightgray;cursor:pointer;}

.estrellas input:checked ~ label,
.estrellas label:hover,
.estrellas label:hover ~ label {
    color:gold;
}

textarea {
    width:100%;
    margin-top:10px;
    padding:10px;
}

/* footer */
footer {
    background:#055160;
    color:white;
    text-align:center;
    padding:20px;
}
</style>
</head>

<body>

<header>
<img src="playa.jpg">
<div class="texto">
<h1>Solera</h1>
<p>Moda verano</p>
</div>
</header>

<nav>
<a href="#novedades">Novedades</a>
<a href="#categorias">Categorías</a>
<a href="#ropa">Ropa</a>
<a href="#contacto">Contacto</a>
<a href="#reseñas">Reseñas</a>
</nav>

<!-- NOVEDADES -->
<section id="novedades">

<h2>Novedades</h2>

<div class="novedades-wrapper">

<button class="flecha" onclick="move(-1)">‹</button>

<div class="novedades-slider" id="slider">

<a href="#p1" class="categoria-card"><img src="vestido1.jpg"><h3>Vestido</h3></a>
<a href="#p2" class="categoria-card"><img src="bolso1.jpg"><h3>Bolso</h3></a>
<a href="#p3" class="categoria-card"><img src="zapato1.jpg"><h3>Sandalia</h3></a>

</div>

<button class="flecha" onclick="move(1)">›</button>

</div>

</section>

<!-- CATEGORÍAS -->
<section id="categorias">

<h2>Categorías</h2>

<div class="categorias-grid">

<a class="categoria-card"><img src="ropa.jpg"><h3>Ropa</h3></a>
<a class="categoria-card"><img src="bolso.jpg"><h3>Complementos</h3></a>
<a class="categoria-card"><img src="zapato.jpg"><h3>Zapatos</h3></a>

</div>

</section>

<!-- ROPA -->
<section id="ropa">
<h2>Ropa</h2>
<div class="caja">Vestido 1</div>
<div class="caja">Vestido 2</div>
</section>

<!-- CONTACTO -->
<section id="contacto">

<h2>Contacto</h2>

<div class="social-grid">

<a href="mailto:soleraropaycomplementos@gmail.com" class="social-card">Gmail</a>

<a href="https://api.whatsapp.com/send?phone=34643319232&text=Buenas%2C%20quiero%20información%20🌞🏖️" class="social-card">WhatsApp</a>

<a href="https://instagram.com" class="social-card">Instagram</a>

<a href="https://facebook.com" class="social-card">Facebook</a>

<a href="https://tiktok.com" class="social-card">TikTok</a>

</div>

</section>

<!-- RESEÑAS -->
<section id="reseñas">

<h2>Reseñas</h2>

<button class="btn-reseña" onclick="abrir()">Dejar reseña</button>

<div class="reseñas-box" id="lista"></div>

</section>

<!-- MODAL -->
<div class="modal-reseña" id="modal">

<div class="modal-box">

<div class="estrellas">
<input type="radio" id="5" name="e" value="5"><label for="5">★</label>
<input type="radio" id="4" name="e" value="4"><label for="4">★</label>
<input type="radio" id="3" name="e" value="3"><label for="3">★</label>
<input type="radio" id="2" name="e" value="2"><label for="2">★</label>
<input type="radio" id="1" name="e" value="1"><label for="1">★</label>
</div>

<textarea id="txt"></textarea>

<button onclick="guardar()">Enviar</button>
<button onclick="cerrar()">Cerrar</button>

</div>

</div>

<footer>
<p>© 2026 Solera</p>
</footer>

<script>

function move(dir){
    const s=document.getElementById("slider");
    const max=s.scrollWidth-s.clientWidth;
    const next=s.scrollLeft+dir*220;

    if(next<0||next>max){
        const a=document.createElement("div");
        a.className="aviso-overlay";
        a.innerHTML="<div class='aviso-box'>No hay resultados</div>";
        document.body.appendChild(a);
        setTimeout(()=>a.remove(),1500);
        return;
    }

    s.scrollBy({left:dir*220,behavior:"smooth"});
}

/* reseñas */
function abrir(){document.getElementById("modal").classList.add("activo");}
function cerrar(){document.getElementById("modal").classList.remove("activo");}

function guardar(){

let e=document.querySelector('input[name="e"]:checked');
let t=document.getElementById("txt").value;

if(!e||t==="")return;

let d=JSON.parse(localStorage.getItem("r"))||[];

d.push({estrellas:e.value,texto:t});

localStorage.setItem("r",JSON.stringify(d));

cerrar();mostrar();
}

function mostrar(){

let c=document.getElementById("lista");
c.innerHTML="";

let d=JSON.parse(localStorage.getItem("r"))||[];

d.forEach(r=>{
let x=document.createElement("div");
x.className="reseña";
x.innerHTML="⭐".repeat(r.estrellas)+"<p>"+r.texto+"</p>";
c.appendChild(x);
});

}

mostrar();

</script>

</body>
</html>

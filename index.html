<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solera</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #eaf6f6;
    color: #333;
    padding-top: 60px;
}

/* NAV */
nav {
    background: #055160;
    text-align: center;
    padding: 14px;
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 1000;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: 600;
}

/* HEADER */
header {
    position: relative;
    height: 340px;
}

header img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(55%);
}

header .texto {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    color: white;
    text-align: center;
}

/* SECCIONES */
section {
    padding: 40px 25px;
}

h2 { text-align: center; }

/* CATEGORÍAS */
.categorias-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

.categoria-card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    text-decoration: none;
    color: black;
    box-shadow: 0 4px 14px rgba(0,0,0,0.1);
}

.categoria-card img {
    width: 100%;
    height: 160px;
    object-fit: cover;
}

.categoria-card h3 {
    text-align: center;
    padding: 10px;
}

/* PRODUCTOS */
.caja {
    background: white;
    padding: 15px;
    margin: 10px auto;
    border-radius: 12px;
    max-width: 500px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    text-align: center;
}

/* NUEVO */
.nuevo::after {
    content: "NUEVO";
    background: red;
    color: white;
    font-size: 11px;
    padding: 3px 6px;
    margin-left: 6px;
    border-radius: 5px;
}

/* NOVEDADES */
.novedades-wrapper {
    display: flex;
    align-items: center;
}

/* SWIPE REAL */
.novedades-slider {
    display: flex;
    gap: 15px;
    overflow-x: auto;
    padding: 10px;
    width: 100%;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
}

.novedades-slider::-webkit-scrollbar {
    display: none;
}

.novedades-slider .categoria-card {
    min-width: 200px;
    flex: 0 0 auto;
    scroll-snap-align: start;
}

/* FLECHAS PC */
.flecha {
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    font-size: 28px;
    padding: 10px;
    cursor: pointer;
    border-radius: 50%;
}

/* MÓVIL SIN FLECHAS */
@media (max-width: 768px) {
    .flecha { display: none !important; }
}

/* POPUP */
.aviso-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.aviso-box {
    background: white;
    padding: 25px 40px;
    border-radius: 15px;
    font-size: 20px;
    font-weight: 600;
}

/* FOOTER */
footer {
    background: #055160;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<header>
    <img src="playa.jpg">
    <div class="texto">
        <h1>Solera</h1>
        <p>Moda verano</p>
    </div>
</header>

<nav>
    <a href="#inicio">Inicio</a>
    <a href="#novedades">Novedades</a>
    <a href="#categorias">Categorías</a>
    <a href="#contacto">Contacto</a>
</nav>

<!-- NOVEDADES -->
<section id="novedades">
<h2>Novedades</h2>

<div class="novedades-wrapper">
<button class="flecha" onclick="move(-1)">&#10094;</button>
<div class="novedades-slider"></div>
<button class="flecha" onclick="move(1)">&#10095;</button>
</div>
</section>

<!-- CATEGORÍAS -->
<section id="categorias">
<h2>Categorías</h2>

<div class="categorias-grid">

<a href="#ropa" class="categoria-card"><img src="ropa.jpg"><h3>Ropa</h3></a>
<a href="#complementos" class="categoria-card"><img src="complementos.jpg"><h3>Complementos</h3></a>
<a href="#zapatos" class="categoria-card"><img src="zapatos.jpg"><h3>Zapatos</h3></a>

</div>
</section>

<!-- PRODUCTOS (IMPORTANTE: SIEMPRE VISIBLES) -->
<section id="ropa">
<h2>Ropa</h2>

<div class="caja nuevo"><a href="#r1"><img src="vestido1.jpg" width="120"></a><p>Vestido blanco</p><p>22€</p></div>
<div class="caja"><a href="#r2"><img src="vestido2.jpg" width="120"></a><p>Vestido azul</p><p>25€</p></div>

</section>

<section id="complementos">
<h2>Complementos</h2>

<div class="caja nuevo"><a href="#c1"><img src="bolso1.jpg" width="120"></a><p>Bolso playa</p><p>15€</p></div>
<div class="caja"><a href="#c2"><img src="bolso2.jpg" width="120"></a><p>Bolso verano</p><p>18€</p></div>

</section>

<section id="zapatos">
<h2>Zapatos</h2>

<div class="caja nuevo"><a href="#z1"><img src="zapato1.jpg" width="120"></a><p>Sandalia</p><p>24€</p></div>
<div class="caja"><a href="#z2"><img src="zapato2.jpg" width="120"></a><p>Cuña</p><p>26€</p></div>

</section>

<script>
const slider = document.querySelector(".novedades-slider");

/* 🔥 SIEMPRE FUNCIONA AUNQUE HAYA POCO CONTENIDO */
document.querySelectorAll(".nuevo").forEach(e => {
    if(!e.querySelector("img")) return;

    const img = e.querySelector("img").src;
    const name = e.querySelector("p").innerText;
    const link = e.querySelector("a").href;

    const card = document.createElement("a");
    card.href = link;
    card.className = "categoria-card";
    card.innerHTML = `<img src="${img}"><h3>${name}</h3>`;

    slider.appendChild(card);
});

function move(dir){
    const max = slider.scrollWidth - slider.clientWidth;
    const next = slider.scrollLeft + dir * 220;

    if(next < 0 || next > max){
        const overlay = document.createElement("div");
        overlay.className = "aviso-overlay";
        overlay.innerHTML = `<div class="aviso-box">No hay más resultados</div>`;
        document.body.appendChild(overlay);
        setTimeout(()=>overlay.remove(),2000);
        return;
    }

    slider.scrollBy({left: dir*220, behavior:"smooth"});
}
</script>

</body>
</html>

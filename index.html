<script>

let cart=[];
let clicks=0;
let currentUser=localStorage.getItem("user")||"user";

/* ADMIN FUNCIONANDO */
document.getElementById("logo").onclick=()=>{
clicks++;
setTimeout(()=>clicks=0,2000);

if(clicks===5){
let pass=prompt("Contraseña admin:");
if(pass==="solera2026"){
alert("Modo admin activado");
}
}
};

/* PRODUCTOS */
const productos=[
{cat:"ropa",img:"vestido1.jpg",nombre:"Vestido verano",precio:19.99},
{cat:"complementos",img:"bolso2.jpg",nombre:"Bolso playa",precio:14.99},
{cat:"zapatos",img:"sandalia1.jpg",nombre:"Sandalia cómoda",precio:24.99}
];

/* CATEGORÍAS */
document.querySelectorAll('.card[data-cat]').forEach(card=>{
card.onclick=()=>{
let cat=card.dataset.cat;
let grid=document.getElementById("productGrid");
grid.innerHTML="";

productos.filter(p=>p.cat===cat).forEach(p=>{
let div=document.createElement("div");
div.className="producto-card";

div.innerHTML=`
<img src="${p.img}">
<h3>${p.nombre}</h3>
<p>${p.precio}€</p>
<button class="btn">Añadir</button>
`;

div.querySelector("button").onclick=(e)=>{
e.stopPropagation();
addToCart(p);
};

div.onclick=()=>openProduct(p);

grid.appendChild(div);
});
};
});

/* 🟢 CARRITO (SUMA REAL) */
function addToCart(p){

let item=cart.find(x=>x.nombre===p.nombre);

if(item){
item.cantidad++;
}else{
cart.push({...p,cantidad:1});
}

updateCart();
showToast();
}

/* 🟢 ACTUALIZAR CARRITO */
function updateCart(){

let list=document.getElementById("cartList");
list.innerHTML="";

let total=0;
let count=0;

cart.forEach((p,i)=>{
total+=p.precio*p.cantidad;
count+=p.cantidad;

list.innerHTML+=`
<div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin:10px 0;">
<img src="${p.img}" style="width:50px;height:50px;object-fit:cover;border-radius:8px;">
<div style="flex:1">${p.nombre}</div>

<div>
<button onclick="changeQty(${i},-1)">-</button>
${p.cantidad}
<button onclick="changeQty(${i},1)">+</button>
</div>

<div>${(p.precio*p.cantidad).toFixed(2)}€</div>
</div>
`;
});

document.getElementById("cartCount").innerText=count;
document.getElementById("total").innerText="Total: "+total.toFixed(2)+"€";
}

/* 🔁 CAMBIAR CANTIDAD */
function changeQty(i,val){
cart[i].cantidad+=val;
if(cart[i].cantidad<=0) cart.splice(i,1);
updateCart();
}

/* 🛒 CARRITO */
function openCart(){
document.getElementById("cartModal").classList.add("activo");
}

function closeCart(){
document.getElementById("cartModal").classList.remove("activo");
}

/* 🔔 TOAST */
function showToast(){
let t=document.getElementById("toast");
t.style.display="block";
setTimeout(()=>t.style.display="none",1200);
}

/* 💳 WHATSAPP */
function checkout(){

let msg="🛍 PEDIDO SOLERA\n\n";
let total=0;

cart.forEach(p=>{
msg+=`${p.nombre} x${p.cantidad} = ${(p.precio*p.cantidad).toFixed(2)}€\n`;
total+=p.precio*p.cantidad;
});

msg+=`\nTOTAL: ${total.toFixed(2)}€\n\n`;
msg+=`Nombre: ${cname.value}\nDirección: ${caddress.value}\nTel: ${cphone.value}`;

window.open("https://wa.me/34643319232?text="+encodeURIComponent(msg));
}

/* PRODUCTO */
function openProduct(p){
document.getElementById("productModal").classList.add("activo");

document.getElementById("productContent").innerHTML=`
<img src="${p.img}" style="width:100%;max-height:350px;object-fit:contain;">
<h2>${p.nombre}</h2>
<p>${p.precio}€</p>

<button class="btn" onclick="addToCart(${JSON.stringify(p).replace(/"/g,'&quot;')})">
Añadir al carrito
</button>

<button class="btn" onclick="shareProduct('${p.nombre}')">
Compartir
</button>
`;
}

function closeProduct(){
document.getElementById("productModal").classList.remove("activo");
}

/* COMPARTIR */
function shareProduct(name){
if(navigator.share){
navigator.share({title:"Solera",text:name,url:location.href});
}
}

/* RESEÑAS (NO TOCADO) */
function openM(){modal.classList.add("activo");}

function saveReview(){
let t=txt.value;
if(!t)return;

let data=JSON.parse(localStorage.getItem("r"))||[];
data.push({user:currentUser,text:t});
localStorage.setItem("r",JSON.stringify(data));
modal.classList.remove("activo");

function loadReviews(){
list.innerHTML="";
(JSON.parse(localStorage.getItem("r"))||[]).forEach(r=>{
list.innerHTML+=`<div class="reseña"><b>${r.user}</b><p>${r.text}</p></div>`;
});
}

loadReviews();

</script>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solera</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#eaf6f6;
padding-top:60px;
}

nav{
background:#055160;
position:fixed;
top:0;
width:100%;
padding:14px;
text-align:center;
z-index:1000;
}

nav a{
color:white;
margin:0 10px;
text-decoration:none;
font-weight:600;
}

header{
height:320px;
position:relative;
}

header img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(60%);
}

header .text{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:10px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
text-align:center;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

#productGrid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
padding:10px;
}

.product{
background:white;
border-radius:12px;
text-align:center;
padding-bottom:10px;
}

.product img{
width:100%;
height:170px;
object-fit:cover;
}

.btn{
background:#055160;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

#cartIcon{
position:fixed;
top:15px;
right:15px;
background:#055160;
color:white;
padding:10px;
border-radius:50px;
cursor:pointer;
z-index:9999;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.modal.active{display:flex;}

.box{
background:white;
padding:20px;
border-radius:12px;
width:90%;
max-width:800px;
}

#toast{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#055160;
color:white;
padding:10px;
border-radius:10px;
display:none;
}

.social a{
display:block;
margin:5px 0;
}

</style>
</head>

<body>

<header>
<img src="playa.jpg">
<div class="text">
<h1>Solera</h1>
<p>Moda verano</p>
</div>
</header>

<nav>
<a href="#categorias">Categorías</a>
<a href="#contacto">Contacto</a>
<a href="#reseñas">Reseñas</a>
</nav>

<div id="cartIcon" onclick="openCart()">🛒 <span id="cartCount">0</span></div>

<section id="categorias">

<div class="grid">
<div class="card" data-cat="ropa"><img src="ropa.jpg"><h3>Ropa</h3></div>
<div class="card" data-cat="complementos"><img src="complementos.jpg"><h3>Complementos</h3></div>
<div class="card" data-cat="zapatos"><img src="zapatos.jpg"><h3>Zapatos</h3></div>
</div>

<div id="productGrid"></div>

</section>

<section id="contacto" class="social">
<h2>Contacto</h2>
<a href="#">Instagram</a>
<a href="#">WhatsApp</a>
<a href="#">TikTok</a>
<a href="#">Facebook</a>
</section>

<section id="reseñas">
<h2>Reseñas</h2>
<button class="btn" onclick="openReview()">Dejar reseña</button>
<div id="reviews"></div>
</section>

<!-- CARRITO -->
<div class="modal" id="cartModal">
<div class="box">
<h2>Carrito</h2>
<div id="cartList"></div>
<h3 id="total"></h3>

<input id="name" placeholder="Nombre"><br><br>
<input id="address" placeholder="Dirección"><br><br>
<input id="phone" placeholder="Teléfono"><br><br>

<button class="btn" onclick="checkout()">Comprar</button>
</div>
</div>

<div id="toast">Añadido</div>

<script>

let cart=[];

const productos=[
{cat:"ropa",img:"vestido1.jpg",nombre:"Vestido verano",precio:20},
{cat:"complementos",img:"bolso2.jpg",nombre:"Bolso playa",precio:15},
{cat:"zapatos",img:"sandalia1.jpg",nombre:"Sandalia",precio:25}
];

document.querySelectorAll(".card").forEach(c=>{
c.onclick=()=>{
let cat=c.dataset.cat;
let grid=document.getElementById("productGrid");
grid.innerHTML="";

productos.filter(p=>p.cat==cat).forEach(p=>{
let div=document.createElement("div");
div.className="product";

div.innerHTML=`
<img src="${p.img}">
<h3>${p.nombre}</h3>
<p>${p.precio}€</p>
<button class="btn">Añadir</button>
`;

div.querySelector("button").onclick=()=>{
cart.push(p);
update();
toast();
};

grid.appendChild(div);
});
};
});

function update(){
document.getElementById("cartCount").innerText=cart.length;

let list=document.getElementById("cartList");
let total=0;
list.innerHTML="";

cart.forEach((p,i)=>{
total+=p.precio;
list.innerHTML+=`<p>${p.nombre} ${p.precio}€</p>`;
});

document.getElementById("total").innerText="Total: "+total+"€";
}

function openCart(){cartModal.classList.add("active");}
function toast(){toast.style.display="block";setTimeout(()=>toast.style.display="none",1000);}

function checkout(){
let msg="Pedido Solera\n";
cart.forEach(p=>msg+=p.nombre+" "+p.precio+"€\n");

window.open("https://wa.me/34643319232?text="+encodeURIComponent(msg));
}

</script>

</body>
</html>

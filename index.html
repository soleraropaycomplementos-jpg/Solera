<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solera</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
html,body{
margin:0;
font-family:Poppins,sans-serif;
background:#eaf6f6;
padding-top:60px;
}

nav{
background:#055160;
position:fixed;
top:0;
width:100%;
text-align:center;
padding:14px;
z-index:1000;
}

nav a{color:white;margin:0 12px;text-decoration:none;font-weight:600;}

header{height:340px;position:relative;}
header img{width:100%;height:100%;object-fit:cover;filter:brightness(55%);}
header .texto{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:white;text-align:center;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;}

.card{
background:white;
border-radius:15px;
overflow:hidden;
text-align:center;
cursor:pointer;
position:relative;
}

.card img{width:100%;height:160px;object-fit:cover;}

#productGrid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:18px;
margin-top:20px;
}

.producto-card{
background:white;
border-radius:16px;
overflow:hidden;
text-align:center;
position:relative;
padding-bottom:10px;
}

.producto-card img{width:100%;height:190px;object-fit:cover;}

.btn{
background:#055160;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
margin:5px;
}

/* ❤️ */
.heart{
position:absolute;
top:8px;
right:8px;
background:white;
border:none;
border-radius:50%;
width:30px;
height:30px;
cursor:pointer;
color:#bbb;
}
.heart.active{color:red;}

/* ICONOS */
#icons{
position:fixed;
top:10px;
right:10px;
display:flex;
gap:10px;
z-index:9999;
}

.iconBtn{
background:#055160;
color:white;
border:none;
padding:10px;
border-radius:50px;
cursor:pointer;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.modal.activo{display:flex;}

.box{
background:white;
padding:20px;
border-radius:12px;
width:90%;
max-width:700px;
}

/* CART ITEM */
.cartItem{
display:flex;
align-items:center;
justify-content:space-between;
gap:10px;
margin:10px 0;
}

.cartItem img{
width:50px;height:50px;object-fit:cover;border-radius:6px;
}

/* RESEÑAS (RESTAURADO) */
.reseñas-box{
max-width:600px;
margin:auto;
height:300px;
overflow-y:auto;
border:1px solid #ddd;
border-radius:12px;
padding:10px;
background:white;
}

.reseña{
background:#f7f7f7;
margin:10px 0;
padding:10px;
border-radius:10px;
}

/* TOAST */
#toast{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#055160;
color:white;
padding:16px 22px;
border-radius:10px;
display:none;
z-index:99999;
}
</style>
</head>

<body>

<header>
<img src="playa.jpg">
<div class="texto">
<h1>Solera</h1>
<p>Moda verano</p>
</div>
</header>

<nav>
<a href="#novedades">Novedades</a>
<a href="#categorias">Categorías</a>
<a href="#contacto">Contacto</a>
<a href="#reseñas">Reseñas</a>
</nav>

<!-- ICONOS -->
<div id="icons">
<button class="iconBtn" onclick="openFav()">❤️ <span id="favCount">0</span></button>
<button class="iconBtn" onclick="openCart()">🛒 <span id="cartCount">0</span></button>
</div>

<!-- NOVEDADES -->
<section id="novedades">
<h2>Novedades</h2>
<div class="grid">
<div class="card"><img src="vestido1.jpg"><h3>Vestido</h3></div>
<div class="card"><img src="bolso2.jpg"><h3>Bolso</h3></div>
<div class="card"><img src="sandalia1.jpg"><h3>Sandalias</h3></div>
</div>
</section>

<!-- CATEGORÍAS -->
<section id="categorias">
<h2>Categorías</h2>

<div class="grid">
<div class="card" data-cat="ropa"><img src="ropa.jpg"><h3>Ropa</h3></div>
<div class="card" data-cat="complementos"><img src="complementos.jpg"><h3>Complementos</h3></div>
<div class="card" data-cat="zapatos"><img src="zapatos.jpg"><h3>Zapatos</h3></div>
</div>

<div id="productGrid"></div>
</section>

<!-- CONTACTO (NO TOCADO) -->
<section id="contacto">
<h2>Contacto</h2>

<div class="social-grid">
<a class="social-card" href="mailto:soleraropaycomplementos@gmail.com">Gmail</a>
<a class="social-card" href="https://wa.me/34643319232">WhatsApp</a>
<a class="social-card" href="https://www.instagram.com/solerashopp">Instagram</a>
<a class="social-card" href="https://www.facebook.com/share/18feHPTPbK/">Facebook</a>
<a class="social-card" href="https://www.tiktok.com/@solerashop8">TikTok</a>
</div>
</section>

<!-- RESEÑAS (RESTAURADO + FUNCIONAL) -->
<section id="reseñas">
<h2>Reseñas</h2>
<button class="btn" onclick="openReview()">Dejar reseña</button>
<div class="reseñas-box" id="reviews"></div>
</section>

<!-- PRODUCTO -->
<div class="modal" id="productModal">
<div class="box">
<div id="productContent"></div>
<button class="btn" onclick="addFromModal()">Añadir al carrito</button>
<button class="btn" onclick="shareProduct()">Compartir</button>
</div>
</div>

<!-- CART -->
<div class="modal" id="cartModal">
<div class="box">
<h2>Carrito</h2>
<div id="cartList"></div>
<h3 id="total"></h3>

<input id="name" placeholder="Nombre"><br><br>
<input id="address" placeholder="Dirección"><br><br>
<input id="phone" placeholder="Teléfono"><br><br>

<select id="payment">
<option>Bizum</option>
<option>Transferencia</option>
<option>Contra reembolso</option>
</select>

<button class="btn" onclick="checkout()">Finalizar compra</button>
</div>
</div>

<!-- FAVORITOS -->
<div class="modal" id="favModal">
<div class="box">
<h2>Favoritos</h2>
<div id="favList"></div>
</div>
</div>

<!-- RESEÑA MODAL -->
<div class="modal" id="reviewModal">
<div class="box">
<textarea id="txt"></textarea>
<button class="btn" onclick="saveReview()">Enviar</button>
</div>
</div>

<div id="toast"></div>

<script>

let cart=JSON.parse(localStorage.getItem("cart")||"[]");
let favs=JSON.parse(localStorage.getItem("favs")||"[]");
let current=null;

/* PRODUCTOS */
const productos=[
{cat:"ropa",img:"vestido1.jpg",nombre:"Vestido verano",precio:19.99},
{cat:"complementos",img:"bolso2.jpg",nombre:"Bolso playa",precio:14.99},
{cat:"zapatos",img:"sandalia1.jpg",nombre:"Sandalia cómoda",precio:24.99}
];

/* CATEGORÍAS */
document.querySelectorAll(".card[data-cat]").forEach(c=>{
c.onclick=()=>{
let grid=document.getElementById("productGrid");
grid.innerHTML="";

productos.filter(p=>p.cat===c.dataset.cat).forEach(p=>{

let div=document.createElement("div");
div.className="producto-card";

let fav=favs.find(f=>f.nombre===p.nombre);

div.innerHTML=`
<button class="heart ${fav?'active':''}">❤</button>
<img src="${p.img}">
<h3>${p.nombre}</h3>
<p>${p.precio}€</p>
<button class="btn">Añadir</button>
`;

div.querySelector(".heart").onclick=(e)=>{
e.stopPropagation();
toggleFav(p);
};

div.querySelector(".btn").onclick=(e)=>{
e.stopPropagation();
addCart(p);
};

div.onclick=()=>openProduct(p);

grid.appendChild(div);
});
};
});

/* FAVORITOS */
function toggleFav(p){
let i=favs.findIndex(f=>f.nombre===p.nombre);
if(i>=0) favs.splice(i,1);
else favs.push(p);

localStorage.setItem("favs",JSON.stringify(favs));
toast("Favoritos actualizado");
renderFav();
}

function renderFav(){
document.getElementById("favCount").innerText=favs.length;

let l=document.getElementById("favList");
l.innerHTML="";

favs.forEach(p=>{
l.innerHTML+=`
<div class="cartItem">
<img src="${p.img}">
<div>${p.nombre}</div>
<button onclick="addCart(${JSON.stringify(p).replace(/"/g,'&quot;')})">Añadir</button>
</div>`;
});
}

/* CART */
function addCart(p){
cart.push({...p,cantidad:1});
localStorage.setItem("cart",JSON.stringify(cart));
renderCart();
toast("Añadido al carrito");
}

function renderCart(){
document.getElementById("cartCount").innerText=cart.length;

let l=document.getElementById("cartList");
l.innerHTML="";
let t=0;

cart.forEach(p=>{
t+=p.precio*p.cantidad;

l.innerHTML+=`
<div class="cartItem">
<img src="${p.img}">
<div>${p.nombre} x${p.cantidad}</div>
</div>`;
});

document.getElementById("total").innerText=t.toFixed(2)+"€";
}

/* PRODUCT */
function openProduct(p){
current=p;
productModal.classList.add("activo");

productContent.innerHTML=`
<img src="${p.img}" style="width:100%">
<h2>${p.nombre}</h2>
<p>${p.precio}€</p>
`;
}

function addFromModal(){addCart(current);}

/* SHARE (RESTAURADO) */
function shareProduct(){
navigator.share?.({title:current.nombre,url:location.href});
}

/* RESEÑAS */
function openReview(){reviewModal.classList.add("activo");}

function saveReview(){
reviewModal.classList.remove("activo");
toast("Reseña guardada");
}

/* MODALS */
function openCart(){cartModal.classList.add("activo");}
function openFav(){favModal.classList.add("activo");}

/* CHECKOUT */
function checkout(){
let msg="🛍 Pedido\n\n";

cart.forEach(p=>{
msg+=`${p.nombre} x${p.cantidad}\n`;
});

window.open("https://wa.me/34643319232?text="+encodeURIComponent(msg));
}

/* TOAST */
function toast(t){
let el=document.getElementById("toast");
el.innerText=t;
el.style.display="block";
setTimeout(()=>el.style.display="none",1500);
}

/* INIT */
renderCart();
renderFav();

</script>

</body>
</html>

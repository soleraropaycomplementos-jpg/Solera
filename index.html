<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Solera</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
html { scroll-behavior: smooth; }

body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: #eaf6f6;
    color: #333;
    padding-top: 60px;
}

/* NAV */
nav {
    background: #055160;
    text-align: center;
    padding: 14px;
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 1000;
}

nav a {
    color: white;
    margin: 0 15px;
    text-decoration: none;
    font-weight: 600;
}

/* HEADER */
header {
    position: relative;
    height: 340px;
}

header img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(55%);
}

header .texto {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    color: white;
    text-align: center;
}

/* PRODUCTOS */
.caja {
    background: white;
    padding: 15px;
    margin: 10px auto;
    border-radius: 12px;
    max-width: 500px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    text-align: center;
}

/* =========================
   RESEÑAS (CUADRO SCROLL)
========================= */

#reseñas {
    background: #fff;
    padding: 40px 20px;
}

.reseñas-box {
    max-width: 600px;
    margin: auto;

    height: 300px;           /* 🔥 clave */
    overflow-y: auto;        /* scroll interno */
    border: 2px solid #ddd;
    border-radius: 12px;
    padding: 10px;
    background: #f9f9f9;
}

/* cada reseña */
.reseña {
    background: white;
    margin-bottom: 10px;
    padding: 12px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}

/* botón */
.btn-reseña {
    display: block;
    margin: 20px auto;
    padding: 12px 20px;
    background: #055160;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* =========================
   MODAL RESEÑA
========================= */

.modal-reseña {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.modal-reseña.activo {
    display: flex;
}

.modal-box {
    background: white;
    padding: 25px;
    border-radius: 12px;
    width: 90%;
    max-width: 400px;
}

/* ESTRELLAS */
.estrellas {
    display: flex;
    flex-direction: row-reverse;
    justify-content: center;
    font-size: 30px;
}

.estrellas input { display: none; }

.estrellas label {
    color: lightgray;
    cursor: pointer;
}

.estrellas input:checked ~ label,
.estrellas label:hover,
.estrellas label:hover ~ label {
    color: gold;
}

textarea {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
}

.modal-box button {
    margin-top: 10px;
    width: 100%;
    padding: 10px;
    background: #055160;
    color: white;
    border: none;
}

/* FOOTER */
footer {
    background: #055160;
    color: white;
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<header>
<img src="playa.jpg">
<div class="texto">
<h1>Solera</h1>
<p>Moda verano</p>
</div>
</header>

<nav>
<a href="#ropa">Ropa</a>
<a href="#reseñas">Reseñas</a>
</nav>

<!-- ROPA -->
<section id="ropa">
<h2>Ropa</h2>
<div class="caja">Vestido ejemplo</div>
</section>

<!-- ================= RESEÑAS ================= -->

<section id="reseñas">
<h2>Opiniones de clientes</h2>

<button class="btn-reseña" onclick="abrir()">Dejar reseña</button>

<div class="reseñas-box" id="lista"></div>

</section>

<!-- MODAL -->
<div class="modal-reseña" id="modal">

<div class="modal-box">

<h3>Escribe tu reseña</h3>

<div class="estrellas">
<input type="radio" id="5" name="e" value="5"><label for="5">★</label>
<input type="radio" id="4" name="e" value="4"><label for="4">★</label>
<input type="radio" id="3" name="e" value="3"><label for="3">★</label>
<input type="radio" id="2" name="e" value="2"><label for="2">★</label>
<input type="radio" id="1" name="e" value="1"><label for="1">★</label>
</div>

<textarea id="txt"></textarea>

<button onclick="guardar()">Enviar</button>
<button onclick="cerrar()">Cerrar</button>

</div>

</div>

<!-- FOOTER -->
<footer>
<p>© 2026 Solera</p>
</footer>

<script>

function abrir(){
    document.getElementById("modal").classList.add("activo");
}

function cerrar(){
    document.getElementById("modal").classList.remove("activo");
}

function guardar(){

    const est = document.querySelector('input[name="e"]:checked');
    const txt = document.getElementById("txt").value;

    if(!est || txt === "") return alert("Completa todo");

    let datos = JSON.parse(localStorage.getItem("r")) || [];

    datos.push({
        estrellas: est.value,
        texto: txt
    });

    localStorage.setItem("r", JSON.stringify(datos));

    cerrar();
    mostrar();
}

function mostrar(){

    const cont = document.getElementById("lista");
    cont.innerHTML = "";

    let datos = JSON.parse(localStorage.getItem("r")) || [];

    datos.forEach(r => {

        const div = document.createElement("div");
        div.className = "reseña";

        div.innerHTML =
        "⭐".repeat(r.estrellas) +
        "<p>" + r.texto + "</p>";

        cont.appendChild(div);
    });

}

mostrar();

</script>

</body>
</html>
